{{- if not .Values.externalSecrets.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.jwtSecretName }}
type: Opaque
stringData:
  {{ .Values.secrets.jwtSecretKey }}: {{ required "env.JWT_SECRET is required when externalSecrets is disabled" .Values.env.JWT_SECRET | quote }}
  {{ .Values.secrets.databaseUrlKey }}: {{ required "env.DATABASE_URL is required when externalSecrets is disabled" .Values.env.DATABASE_URL | quote }}
{{- end }}
