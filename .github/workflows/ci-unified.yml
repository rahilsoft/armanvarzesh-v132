name: Unified CI
on:
  pull_request:
  push:
    branches: [ main ]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10'
  # Optional: set to comma-separated URLs to enable Lighthouse in CI
  LHCI_URLS: ''

jobs:
  setup:
    name: Setup & Install
    runs-on: ubuntu-latest
    outputs:
      target_matrix: ${{ steps.generate_matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      # pnpm must be set up BEFORE setup-node so `cache: 'pnpm'` can find it.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Save workspace info
        run: pnpm -r list --depth -1 || true
      - name: Generate target matrix
        id: generate_matrix
        shell: bash
        # A heredoc terminator would have to sit at column 0, which ends the
        # YAML block scalar early and invalidates the workflow file, so the
        # generator lives in a single-quoted node -e expression instead.
        run: |
          matrix=$(node -e 'const fs=require("fs"),path=require("path");const groups=["apps","services"];const entries=[];for(const group of groups){if(!fs.existsSync(group))continue;for(const entry of fs.readdirSync(group)){if(entry.startsWith("."))continue;const full=path.join(group,entry);if(!fs.statSync(full).isDirectory())continue;entries.push({target:group+"/"+entry,slug:group+"-"+entry});}}process.stdout.write(JSON.stringify(entries));')
          echo "matrix=$matrix" >> $GITHUB_OUTPUT

  lint_typecheck_test:
    name: Lint • Typecheck • Unit/Integration (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup.outputs.target_matrix) }}
    steps:
      - uses: actions/checkout@v4
      # pnpm must be set up BEFORE setup-node so `cache: 'pnpm'` can find it.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - name: Setup pnpm store cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ matrix.slug }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Cache turbo outputs
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ matrix.slug }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client (typecheck needs it)
        env:
          TARGET_PATH: ${{ matrix.target }}
        run: |
          if [ -f "${TARGET_PATH}/prisma/schema.prisma" ]; then
            (cd "${TARGET_PATH}" && npx prisma generate)
          fi
      # matrix.target is a directory path (e.g. apps/web-site); turbo treats a
      # bare --filter value as a package NAME, so the path must be ./-prefixed
      # to select by directory.
      - name: Lint (affected)
        run: pnpm dlx turbo run lint --filter=./${{ matrix.target }}
      - name: Typecheck (affected)
        run: pnpm dlx turbo run typecheck --filter=./${{ matrix.target }}
      - name: Test (affected)
        run: pnpm dlx turbo run test --filter=./${{ matrix.target }} -- --passWithNoTests
      - name: Collect coverage if exists
        env:
          TARGET_PATH: ${{ matrix.target }}
        run: |
          mkdir -p coverage-artifacts
          if [ -d "${TARGET_PATH}" ]; then
            find "${TARGET_PATH}" -maxdepth 5 -type f -name "lcov.info" -print -exec cp {} coverage-artifacts/ \; || true
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.slug }}
          path: coverage-artifacts
          if-no-files-found: ignore

  build_all:
    name: Build (packages & apps)
    runs-on: ubuntu-latest
    needs: [setup, lint_typecheck_test]
    steps:
      - uses: actions/checkout@v4
      # pnpm must be set up BEFORE setup-node so `cache: 'pnpm'` can find it.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma clients (services build against them)
        run: pnpm run db:generate:all
      # No --no-cache: pnpm does not know the flag and forwards it into every
      # package's build script, breaking them (it belongs to turbo, not pnpm).
      - run: pnpm -r build

  sbom_sca_sast:
    name: SBOM • SCA • SAST
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      # pnpm must be set up BEFORE setup-node so `cache: 'pnpm'` can find it.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: CycloneDX SBOM
        run: |
          npx @cyclonedx/cyclonedx-npm@4.1.0 --output-file sbom.json --output-format json || true
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
          if-no-files-found: ignore
      - name: npm audit (SCA)
        run: pnpm audit --json || true
      - name: ESLint SAST (basic)
        run: pnpm -r lint

  container_build_scan:
    name: Container Build • FS Scan
    runs-on: ubuntu-latest
    needs: build_all
    steps:
      - uses: actions/checkout@v4
      - name: Find Dockerfiles
        id: list
        run: |
          mapfile -t files < <(git ls-files | grep -E '(^|/)(Dockerfile|dockerfile)$' || true)
          printf "%s\n" "${files[@]}" > dockerfiles.txt
          echo "count=$(wc -l < dockerfiles.txt)" >> "$GITHUB_OUTPUT"
      - name: Build backend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./app/backend/Dockerfile
          push: false
      # Pinned tags (e.g. 0.24.0) stopped resolving upstream; trivy-scan.yml
      # already tracks master and stays green, so match it.
      - name: Trivy FS scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true

  lighthouse:
    name: Lighthouse (optional)
    runs-on: ubuntu-latest
    needs: build_all
    steps:
      - name: Run LHCI
        if: ${{ env.LHCI_URLS != '' }}
        run: |
          npm i -g @lhci/cli@0.13.x
          IFS=',' read -ra URLS <<< "${LHCI_URLS}"
          mkdir -p lighthouse
          for u in "${URLS[@]}"; do
            safe_name=$(echo "$u" | sed 's/[^a-zA-Z0-9]/_/g')
            lhci collect --url "$u" --numberOfRuns=1 --output-path="./lighthouse/${safe_name}.json" || true
          done
      - uses: actions/upload-artifact@v4
        if: ${{ env.LHCI_URLS != '' }}
        with:
          name: lighthouse
          path: lighthouse
          if-no-files-found: ignore

  dependency-review:
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # The action hard-fails when the repo's Dependency Graph is disabled
      # (a Settings-only toggle). Probe availability first so the job skips
      # with a visible notice until an admin enables it, and becomes a real
      # gate automatically once they do.
      - name: Check Dependency Graph availability
        id: depgraph
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/dependency-graph/sbom")
          if [ "$code" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Dependency Graph is disabled on this repository (HTTP $code); dependency review skipped. Enable it under Settings → Security → Dependency graph to arm this gate."
            echo "Dependency review skipped: Dependency Graph is disabled (HTTP $code)." >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Dependency Review
        if: steps.depgraph.outputs.enabled == 'true'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: true
  sast-semgrep:
    needs: build_all
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Semgrep
        run: pip install --upgrade semgrep

      # `semgrep ci` dropped --strict/--enable-metrics and now requires an
      # app token, so run a plain scan with the public p/ci ruleset instead,
      # blocking only on ERROR-severity findings.
      - name: Semgrep scan (blocking at ERROR severity)
        run: semgrep scan --config p/ci --metrics=off --severity ERROR --error