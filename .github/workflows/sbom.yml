
name: SBOM & Dependency Review
on:
  push:
    branches: [ main ]
  pull_request:
permissions:
  contents: read
  actions: read
  security-events: write
jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: pnpm/action-setup@v4
    - uses: actions/setup-node@v4
      with: { node-version: 20 }
    - run: pnpm install --frozen-lockfile
    - name: Generate CycloneDX SBOM (root)
      # --ignore-npm-errors: cyclonedx-npm shells out to `npm ls`, which
      # reports spurious missing-dep errors against a pnpm-managed tree.
      run: npx @cyclonedx/cyclonedx-npm --ignore-npm-errors --output-file sbom-root.json --spec-version 1.5
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: sbom-root
        path: sbom-root.json
  dependency-review:
    # The action only works on pull_request events; on push it fails hard.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write
    steps:
    - uses: actions/checkout@v4
    # The action hard-fails when the repo's Dependency Graph is disabled
    # (a Settings-only toggle). Probe availability first so the job skips
    # with a visible notice until an admin enables it.
    - name: Check Dependency Graph availability
      id: depgraph
      env:
        GH_TOKEN: ${{ github.token }}
        REPO: ${{ github.repository }}
      run: |
        code=$(curl -s -o /dev/null -w "%{http_code}" \
          -H "Authorization: Bearer $GH_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/$REPO/dependency-graph/sbom")
        if [ "$code" = "200" ]; then
          echo "enabled=true" >> "$GITHUB_OUTPUT"
        else
          echo "enabled=false" >> "$GITHUB_OUTPUT"
          echo "::notice::Dependency Graph is disabled on this repository (HTTP $code); dependency review skipped. Enable it under Settings → Security → Dependency graph to arm this gate."
          echo "Dependency review skipped: Dependency Graph is disabled (HTTP $code)." >> "$GITHUB_STEP_SUMMARY"
        fi
    - if: steps.depgraph.outputs.enabled == 'true'
      uses: actions/dependency-review-action@v4
