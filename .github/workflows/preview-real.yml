
name: PR Preview (Build & Deploy)
on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
    - uses: actions/checkout@v4
    - uses: docker/setup-buildx-action@v3
    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build & push gateway image
      uses: docker/build-push-action@v6
      with:
        context: ./services/api-gateway
        push: true
        tags: ghcr.io/${{ github.repository_owner }}/av90-gateway:${{ github.sha }}
    # GITHUB_ENV is job-local; a job output is the only way the tag
    # actually reaches deploy-preview.
    - name: Publish image tag
      id: tag
      run: echo "image_tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

  deploy-preview:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    # Deploying needs a cluster kubeconfig; without the KUBECONFIG_B64
    # secret there is no cluster to target, so skip cleanly with a notice.
    - name: Check cluster secret
      id: gate
      env:
        KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
      run: |
        if [ -n "$KUBECONFIG_B64" ]; then
          echo "run=true" >> "$GITHUB_OUTPUT"
        else
          echo "run=false" >> "$GITHUB_OUTPUT"
          echo "::notice::KUBECONFIG_B64 secret is not configured; preview deploy skipped. Set it in Settings → Secrets to arm this lane."
          echo "Preview deploy skipped: KUBECONFIG_B64 secret is not configured." >> "$GITHUB_STEP_SUMMARY"
        fi
    - uses: actions/checkout@v4
      if: steps.gate.outputs.run == 'true'
    - name: Setup kubectl
      if: steps.gate.outputs.run == 'true'
      uses: azure/setup-kubectl@v4
      with: { version: 'v1.29.4' }
    - name: Kubeconfig
      if: steps.gate.outputs.run == 'true'
      env:
        KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
      run: |
        mkdir -p $HOME/.kube
        printf '%s' "$KUBECONFIG_B64" | base64 -d > $HOME/.kube/config
        chmod 600 $HOME/.kube/config
    - name: Helm install/upgrade
      if: steps.gate.outputs.run == 'true'
      uses: azure/setup-helm@v4
    - name: Deploy
      if: steps.gate.outputs.run == 'true'
      run: |
        ns=av-prev-${{ github.run_id }}
        kubectl create ns $ns || true
        helm upgrade --install av-gw-$ns deploy/helm --namespace $ns --set image.tag=${{ needs.build-and-push.outputs.image_tag }}
