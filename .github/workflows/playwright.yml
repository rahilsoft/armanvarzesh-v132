name: playwright
on: [push, pull_request]
jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Enable corepack
        run: corepack enable
      - name: Install deps
        run: pnpm install
      - name: Build site
        working-directory: apps/web-site
        run: pnpm build
      # pnpm forwards the literal "--" into the script and Next 15's CLI
      # then reads "-p" as a project directory; PORT avoids argv entirely.
      - name: Start site
        working-directory: apps/web-site
        run: PORT=3001 pnpm start &
      - name: Wait for site
        run: |
          for i in $(seq 1 60); do
            curl -fsS -o /dev/null http://127.0.0.1:3001/ && exit 0
            sleep 2
          done
          echo "site never became reachable on :3001" >&2
          exit 1
      - name: Install browsers
        working-directory: apps/web-site
        run: pnpm exec playwright install --with-deps
      - name: Run Playwright tests
        working-directory: apps/web-site
        env:
          SITE_URL: http://127.0.0.1:3001
        run: pnpm exec playwright test
